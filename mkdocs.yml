site_name: Ceph文档
theme:
  # The available installed themes are: 
  # mkdocs, readthedocs, cerulean, cosmo, cyborg, darkly, flatly, journal, litera,
  # lumen, lux, materia, minty, pulse, sandstone, simplex, slate, solar, spacelab, superhero, united, yeti
  # 或者参考https://mkdocs.readthedocs.io/en/0.15.1/user-guide/styling-your-docs/
  name: material       # 必须用这个主题，所有功能原生支持
  language: zh
  features:
    - navigation.instant        # 页面无刷新跳转，提供 SPA 体验
    - navigation.tabs           # 顶部显示一级导航标签
    - navigation.sections       # 导航分组可折叠展开
    - navigation.top            # 显示返回顶部按钮
    - navigation.indexes        # 允许索引页作为可折叠节点
    - navigation.tracking       # 🔧 添加：滚动时自动更新侧边栏高亮
    - search.suggest            # 搜索时提供建议
    - search.highlight          # 搜索结果高亮显示
    - content.code.annotate     # 支持代码注解（行内注释）
  palette:
  - scheme: default           # 亮色主题
    primary: indigo           # 主色调（导航栏、按钮等）
    accent: indigo            # 强调色（链接、悬浮效果等）
    toggle:
      icon: material/weather-night  # 切换暗色模式的图标
      name: 暗色模式                 # 鼠标悬浮显示的文字
  - scheme: slate                   # 暗色主题
    primary: indigo
    accent: indigo
    toggle:
      icon: material/weather-sunny # 切换亮色模式的图标
      name: 亮色模式
  font:
    text: Noto Sans SC    # 正文字体（思源黑体，支持中文）
    code: JetBrains Mono  # 代码字体（JetBrains Mono，支持代码块）


plugins:
  - search

# 👇 核心：列表 + 脚注 + Mermaid + 不提取标题
markdown_extensions:
  - toc:
      baselevel: 2        # 强制导航用文件名，不提取一级标题
  - tables                # 表格支持
  - nl2br                  # 换行自动转 <br>
  - attr_list              # 属性列表
  - def_list               # 定义列表（术语解释）
  - footnotes              # ✅ 脚注支持
  - admonition             # 提示框
  - fenced_code            # 代码块支持
  - pymdownx.details       # 折叠块（??? 语法）
  - pymdownx.tabbed:       # 标签页（=== 语法）
      alternate_style: true
  - pymdownx.tasklist:     # 任务列表（- [ ] 语法）
      custom_checkbox: true
  - pymdownx.highlight:    # 代码高亮
      guess_lang: true
      anchor_linenums: true
  # - toc:
  #     permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format